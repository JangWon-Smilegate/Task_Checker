<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAM 업무 추이 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #ddd; padding: 24px; }

h1 { font-size: 20px; color: #fff; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #888; margin-bottom: 24px; }

/* 요약 카드 */
.summary-cards { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px 20px; min-width: 140px; flex: 1; }
.card .label { font-size: 11px; color: #888; margin-bottom: 4px; }
.card .value { font-size: 28px; font-weight: 700; color: #fff; }
.card .value.danger { color: #e55; }
.card .value.warn { color: #ea5; }
.card .value.ok { color: #5a5; }

/* 필터 */
.filters { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
.filters select, .filters button {
  padding: 8px 14px; border: 1px solid #444; border-radius: 8px;
  background: #2a2a2a; color: #ddd; font-size: 13px; cursor: pointer;
}
.filters button:hover { background: #3a3a3a; }
.filters button.active { background: #335; border-color: #668; }

/* 차트 영역 */
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.chart-box { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; }
.chart-box h3 { font-size: 14px; color: #aaa; margin-bottom: 12px; }
.chart-box canvas { max-height: 280px; }

/* 테이블 */
.section { margin-bottom: 24px; }
.section h3 { font-size: 14px; color: #aaa; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; color: #888; border-bottom: 1px solid #333; font-weight: 600; }
td { padding: 8px 10px; border-bottom: 1px solid #222; }
tr:hover td { background: #1f1f1f; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge.high { background: #522; color: #e88; }
.badge.medium { background: #442; color: #ea8; }
.badge.low { background: #234; color: #8ac; }

.link { color: #7af; text-decoration: none; }
.link:hover { text-decoration: underline; }

@media (max-width: 900px) {
  .charts { grid-template-columns: 1fr; }
  .summary-cards { flex-direction: column; }
}
</style>
</head>
<body>

<h1>LAM 업무 추이 대시보드</h1>
<div class="subtitle" id="dateLabel">데이터 로딩 중...</div>

<!-- 요약 카드 -->
<div class="summary-cards">
  <div class="card"><div class="label">전체 업무</div><div class="value" id="totalCard">-</div></div>
  <div class="card"><div class="label">진행중</div><div class="value ok" id="progressCard">-</div></div>
  <div class="card"><div class="label">미완료</div><div class="value" id="incompleteCard">-</div></div>
  <div class="card"><div class="label">지연</div><div class="value danger" id="delayedCard">-</div></div>
  <div class="card"><div class="label">D-day</div><div class="value warn" id="ddayCard">-</div></div>
</div>

<!-- 필터 -->
<div class="filters">
  <select id="deptFilter"><option value="">전체 부서</option></select>
  <select id="periodFilter">
    <option value="7">1주</option>
    <option value="14" selected>2주</option>
    <option value="30">1개월</option>
  </select>
  <button id="refreshBtn">새로고침</button>
</div>

<!-- 차트 -->
<div class="charts">
  <div class="chart-box">
    <h3>업무 건수 추이</h3>
    <canvas id="trendChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>지연 + D-day 추이</h3>
    <canvas id="riskChart"></canvas>
  </div>
</div>

<!-- 부서별 현황 -->
<div class="section">
  <h3>부서별 현황</h3>
  <table>
    <thead><tr><th>부서</th><th>전체</th><th>진행중</th><th>미완료</th><th>지연</th><th>D-day</th><th>리스크</th></tr></thead>
    <tbody id="deptTable"></tbody>
  </table>
</div>

<!-- 담당자 과부하 -->
<div class="section">
  <h3>주의 필요 담당자 (지연 + D-day 1건 이상)</h3>
  <table>
    <thead><tr><th>담당자</th><th>부서</th><th>전체</th><th>진행중</th><th>미완료</th><th>지연</th><th>D-day</th><th>리스크</th></tr></thead>
    <tbody id="memberTable"></tbody>
  </table>
</div>

<!-- 지연 업무 상세 -->
<div class="section">
  <h3>지연 업무 상세</h3>
  <table>
    <thead><tr><th>업무</th><th>담당자</th><th>부서</th><th>마감일</th><th>지연일</th></tr></thead>
    <tbody id="delayedTable"></tbody>
  </table>
</div>

<script>
const API = '';
let trendChart, riskChart;

async function fetchJSON(url) {
  const r = await fetch(API + url);
  return r.json();
}

async function loadDashboard() {
  const dept = document.getElementById('deptFilter').value;
  const days = document.getElementById('periodFilter').value;

  // 1. 요약
  const summary = await fetchJSON(`/api/summary${dept ? '?department=' + dept : ''}`);
  document.getElementById('dateLabel').textContent = `${summary.date || '-'} 기준`;
  document.getElementById('totalCard').textContent = summary.total || 0;
  document.getElementById('delayedCard').textContent = summary.delayed || 0;
  document.getElementById('ddayCard').textContent = summary.d_day || 0;

  let inProgress = 0, incomplete = 0;
  (summary.departments || []).forEach(d => {
    inProgress += d.in_progress;
    incomplete += d.incomplete;
  });
  document.getElementById('progressCard').textContent = inProgress;
  document.getElementById('incompleteCard').textContent = incomplete;

  // 부서 필터 옵션 (최초 1회)
  const deptSelect = document.getElementById('deptFilter');
  if (deptSelect.options.length <= 1) {
    (summary.departments || []).forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.department;
      opt.textContent = d.department;
      deptSelect.appendChild(opt);
    });
  }

  // 부서 테이블
  const deptTbody = document.getElementById('deptTable');
  deptTbody.innerHTML = '';
  (summary.departments || []).forEach(d => {
    const risk = (d.delayed + d.d_day) >= 5 ? 'high' : (d.delayed + d.d_day) >= 1 ? 'medium' : 'low';
    const label = risk === 'high' ? '높음' : risk === 'medium' ? '중간' : '낮음';
    deptTbody.innerHTML += `<tr>
      <td>${d.department}</td><td>${d.total}</td><td>${d.in_progress}</td>
      <td>${d.incomplete}</td><td style="color:#e88">${d.delayed}</td>
      <td style="color:#ea8">${d.d_day}</td>
      <td><span class="badge ${risk}">${label}</span></td>
    </tr>`;
  });

  // 2. 추이 차트
  const trend = await fetchJSON(`/api/trend?days=${days}${dept ? '&department=' + dept : ''}`);
  updateTrendChart(trend.data);
  updateRiskChart(trend.data);

  // 3. 담당자 과부하
  const members = await fetchJSON(`/api/members${dept ? '?department=' + dept : ''}`);
  const memberTbody = document.getElementById('memberTable');
  memberTbody.innerHTML = '';
  (members.members || []).filter(m => m.delayed + m.d_day > 0).forEach(m => {
    const cls = m.risk === 'HIGH' ? 'high' : m.risk === 'MEDIUM' ? 'medium' : 'low';
    const label = m.risk === 'HIGH' ? '높음' : m.risk === 'MEDIUM' ? '중간' : '낮음';
    memberTbody.innerHTML += `<tr>
      <td><strong>${m.assignee}</strong></td><td>${m.department}</td>
      <td>${m.total}</td><td>${m.in_progress}</td><td>${m.incomplete}</td>
      <td style="color:#e88">${m.delayed}</td><td style="color:#ea8">${m.d_day}</td>
      <td><span class="badge ${cls}">${label}</span></td>
    </tr>`;
  });

  // 4. 지연 업무
  const delayed = await fetchJSON('/api/delayed');
  const delayedTbody = document.getElementById('delayedTable');
  delayedTbody.innerHTML = '';
  (delayed.tasks || []).forEach(t => {
    const taskUrl = t.task_id.startsWith('LAM-')
      ? `https://jira.sgr.com/browse/${t.task_id}`
      : `http://lam.sgr.com/${t.task_id}`;
    delayedTbody.innerHTML += `<tr>
      <td><a class="link" href="${taskUrl}" target="_blank">${t.title}</a></td>
      <td>${t.assignee}</td><td>${t.department}</td>
      <td>${t.end_date}</td><td style="color:#e88"><strong>${t.delay_days}일</strong></td>
    </tr>`;
  });
}

function updateTrendChart(data) {
  const labels = data.map(d => d.date.slice(5)); // MM-DD
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '전체', data: data.map(d => d.total), borderColor: '#7af', backgroundColor: 'rgba(119,170,255,0.1)', fill: true, tension: 0.3 },
        { label: '진행중', data: data.map(d => d.in_progress), borderColor: '#5a5', tension: 0.3 },
        { label: '미완료', data: data.map(d => d.incomplete), borderColor: '#ea5', tension: 0.3 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#aaa', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#888' }, grid: { color: '#222' } },
        y: { ticks: { color: '#888' }, grid: { color: '#222' } }
      }
    }
  });
}

function updateRiskChart(data) {
  const labels = data.map(d => d.date.slice(5));
  const ctx = document.getElementById('riskChart').getContext('2d');
  if (riskChart) riskChart.destroy();
  riskChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '지연', data: data.map(d => d.delayed), backgroundColor: 'rgba(238,85,85,0.7)' },
        { label: 'D-day', data: data.map(d => d.d_day), backgroundColor: 'rgba(238,170,85,0.7)' },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#aaa', font: { size: 11 } } } },
      scales: {
        x: { stacked: true, ticks: { color: '#888' }, grid: { color: '#222' } },
        y: { stacked: true, ticks: { color: '#888' }, grid: { color: '#222' } }
      }
    }
  });
}

// 이벤트
document.getElementById('deptFilter').addEventListener('change', loadDashboard);
document.getElementById('periodFilter').addEventListener('change', loadDashboard);
document.getElementById('refreshBtn').addEventListener('click', loadDashboard);

// 초기 로드
loadDashboard();
</script>
</body>
</html>
